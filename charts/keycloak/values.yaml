keycloak-operator:
  adminBootstrap:
    enabled: true
    password: change_me

  # imagePullSecrets:
  #   - name: nexus-gcloud

  vault:
    enabled: true

  grafana:
    enabled: true

  keycloak:
    bootstrapAdmin:
      secret: keycloak-admin-bootstrap
    instances: 1
    hostname:
      hostname: https://auth.mia-platform.test
    ingressRoute:
      enabled: true
    db:
      vendor: postgres
      url: jdbc:postgresql://postgres-postgresql.postgres.svc.cluster.local:5432/keycloak
      usernameSecret:
        name: keycloak-postgres-credentials
        key: username
      passwordSecret:
        name: keycloak-postgres-credentials
        key: password

    image:
      tag: "0.3.2-26.6.4-postgres"
    # Keycloak (a JVM) fetches the services' merged client JWKS
    # (https://<host>.mia-platform.test/.well-known/jwks.json — mkcert-signed,
    # via Traefik -> Envoy) to verify private_key_jwt client assertions. Java
    # ignores the OS CA bundle / SSL_CERT_FILE, so point Keycloak's native
    # truststore at the mkcert-inclusive bundle that Kyverno clones into this
    # namespace (see hacks/kyverno.sh). Merged bundle => the external Okta IdP
    # (public CA) keeps working too.
    truststores:
      mkcert:
        configMap:
          name: mkcert-ca-bundle
    tracing:
      enabled: true
      endpoint: http://opentelemetry-collector.tracing-system.svc.cluster.local:4317
    telemetry:
      endpoint: http://opentelemetry-collector.tracing-system.svc.cluster.local:4317
