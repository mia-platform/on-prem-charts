apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-route
  labels:
    app.kubernetes.io/part-of: "console"
    app.kubernetes.io/managed-by: "Helm"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
spec:
  entryPoints:
    - "websecure"
  routes:
    - match: Host(`{{ (urlParse (index .Values "mia-console" "configurations" "consoleUrl")).host }}`)
      kind: Rule
      services:
        - name: "api-gateway"
          port: 8080
    - match: Host(`{{ (urlParse (index .Values "mia-console" "configurations" "cmsUrl")).host }}`)
      kind: Rule
      services:
        - name: "api-gateway"
          port: 8081