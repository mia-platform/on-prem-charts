apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-route
  labels:
    app.kubernetes.io/part-of: "console"
    app.kubernetes.io/managed-by: "Helm"
    helm.sh/chart: "console-15.0.0"
spec:
  entryPoints:
    - "websecure"
  routes:
    - match: Host(`console.mia-platform.test`)
      kind: Rule
      services:
        - name: "api-gateway"
          port: 8080
    - match: Host(`cms-console.mia-platform.test`)
      kind: Rule
      services:
        - name: "api-gateway"
          port: 8081