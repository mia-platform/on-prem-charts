kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraMounts:
      - containerPath: /var/lib/kubelet/config.json
        hostPath: .kind/.local/docker/config.json
    extraPortMappings:
      # host 80  -> Traefik web       (node hostPort 8000)
      - containerPort: 8000
        hostPort: 80
        protocol: TCP
      # host 443 -> Traefik websecure (node hostPort 8443)
      - containerPort: 8443
        hostPort: 443
        protocol: TCP
  - role: worker
    extraMounts:
      - containerPath: /var/lib/kubelet/config.json
        hostPath: .kind/.local/docker/config.json
  - role: worker
    extraMounts:
      - containerPath: /var/lib/kubelet/config.json
        hostPath: .kind/.local/docker/config.json
  - role: worker
    extraMounts:
      - containerPath: /var/lib/kubelet/config.json
        hostPath: .kind/.local/docker/config.json
